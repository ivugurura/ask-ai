name: Quality Checks

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pipenv"
          cache-dependency-path: "Pipfile.lock"

      - name: Install Pipenv
        run: python -m pip install --upgrade pip pipenv

      - name: Install dependencies
        run: pipenv sync --dev

      - name: Prepare CI environment variables
        run: |
          {
            echo "DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@localhost:5432/postgres}"
            echo "ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}"
            echo "EMBEDDING_MODEL=${EMBEDDING_MODEL:-paraphrase-multilingual-MiniLM-L12-v2}"
            echo "TOP_K=${TOP_K:-6}"
            echo "OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://localhost:11434}"
            echo "OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:0.5b}"
            echo "SUMMARY_MAX_CHARS=${SUMMARY_MAX_CHARS:-4000}"
            echo "RELEVANCE_MAX_DISTANCE=${RELEVANCE_MAX_DISTANCE:-0.7}"
          } > .env
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ALLOWED_ORIGINS: ${{ vars.ALLOWED_ORIGINS }}
          EMBEDDING_MODEL: ${{ vars.EMBEDDING_MODEL }}
          TOP_K: ${{ vars.TOP_K }}
          OLLAMA_BASE_URL: ${{ vars.OLLAMA_BASE_URL }}
          OLLAMA_MODEL: ${{ vars.OLLAMA_MODEL }}
          SUMMARY_MAX_CHARS: ${{ vars.SUMMARY_MAX_CHARS }}
          RELEVANCE_MAX_DISTANCE: ${{ vars.RELEVANCE_MAX_DISTANCE }}

      - name: Lint
        run: pipenv run ruff check app tests
