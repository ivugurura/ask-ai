name: Deploy

on:
  workflow_run:
    workflows:
      - Quality Checks
    types:
      - completed

concurrency:
  group: deploy-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  deploy:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      (
        github.event.workflow_run.head_branch == 'develop' ||
        github.event.workflow_run.head_branch == 'main'
      )
    name: Deploy to ${{ github.event.workflow_run.head_branch == 'main' && 'production' || 'staging' }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.workflow_run.head_branch == 'main' && 'production' || 'staging' }}

    steps:
      - name: Set deployment variables
        id: vars
        shell: bash
        run: |
          if [ "${{ github.event.workflow_run.head_branch }}" = "main" ]; then
            echo "app_env=production" >> "$GITHUB_OUTPUT"
            echo "deploy_branch=main" >> "$GITHUB_OUTPUT"
          else
            echo "app_env=staging" >> "$GITHUB_OUTPUT"
            echo "deploy_branch=develop" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script_stop: true
          script: |
            set -e

            APP_DIR="${{ secrets.APP_DIR }}"
            SERVICE_NAME="${{ secrets.SERVICE_NAME }}"
            DEPLOY_BRANCH="${{ steps.vars.outputs.deploy_branch }}"
            APP_ENV="${{ steps.vars.outputs.app_env }}"

            cd "$APP_DIR"
            git checkout "$DEPLOY_BRANCH"
            git reset --hard "origin/$DEPLOY_BRANCH"
            git pull origin "$DEPLOY_BRANCH"

            if [ ! -d .venv ]; then
              python3 -m venv .venv
            fi

            . .venv/bin/activate
            pip install --upgrade pip

            if [ -f requirements.txt ]; then
              pip install -r requirements.txt
            fi

            if [ -f .env ]; then
              set -a
              . ./.env
              set +a
            fi

            export APP_ENV="$APP_ENV"
            export ENVIRONMENT="$APP_ENV"

            if [ -f alembic.ini ]; then
              .venv/bin/alembic upgrade head
            fi

            if ! sudo -n true 2>/dev/null; then
              echo "Passwordless sudo is not configured for this SSH user."
              echo "Grant NOPASSWD for systemctl restart/status on $SERVICE_NAME in /etc/sudoers.d/."
              exit 1
            fi

            sudo -n systemctl restart "$SERVICE_NAME"
            sudo -n systemctl status "$SERVICE_NAME" --no-pager

      - name: Verify health check
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script_stop: true
          script: |
            set -e
            HEALTH_URL="${{ secrets.HEALTH_URL }}"

            if [ -n "$HEALTH_URL" ]; then
              curl --fail --silent --show-error --max-time 15 "$HEALTH_URL"
            else
              echo "HEALTH_URL secret is not set; skipping health check."
            fi
